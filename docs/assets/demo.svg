<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="612" viewBox="0 0 1060 612" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">
  <!-- Terminal rendering of a real fswreck session (output copied verbatim
       from a Linux container run on 2026-07-13, seed 42). The dim "#" remarks
       on the two café lines are annotations, not tool output. -->
  <rect width="1060" height="612" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">fswreck — will your tool survive this directory?</text>

  <g fill="#adbac7">
    <text x="24" y="66"><tspan fill="#6cb6ff">$</tspan> fswreck generate ./wreck</text>
    <text x="24" y="92" fill="#768390">generated 317 entries under ./wreck (seed 42, depth 32, modules: unicode, names, symlinks, deep, perms, exotic)</text>
    <text x="24" y="118" fill="#768390">manifest: ./wreck/.fswreck-manifest.json</text>

    <text x="24" y="170"><tspan fill="#6cb6ff">$</tspan> fswreck plan --modules unicode | head -5</text>
    <text x="24" y="198" fill="#909dab">KIND       MODE     SIZE  PATH</text>
    <text x="24" y="224">dir         755        -  unicode</text>
    <text x="24" y="250">file        644       96  <tspan fill="#e0b543">unicode/caf%C3%A9.txt</tspan>   <tspan fill="#768390"># NFC…</tspan></text>
    <text x="24" y="276">file        644       96  <tspan fill="#e0b543">unicode/cafe%CC%81.txt</tspan>  <tspan fill="#768390"># …and its NFD twin</tspan></text>
    <text x="24" y="302">file        644       96  unicode/a%CC%80%CC%81%CC%82grave.txt</text>

    <text x="24" y="354"><tspan fill="#6cb6ff">$</tspan> your-backup-tool ./wreck /mnt/restore   <tspan fill="#768390"># the code under test runs here</tspan></text>

    <text x="24" y="406"><tspan fill="#6cb6ff">$</tspan> fswreck verify ./wreck</text>
    <text x="24" y="434" fill="#f47067">problem: symlinks/ping: target elsewhere, manifest says pong</text>
    <text x="24" y="460" fill="#f47067">problem: perms/read-only.txt: mode 666, manifest says 444</text>
    <text x="24" y="486" fill="#f47067">problem: exotic/empty.txt: missing (file in manifest)</text>
    <text x="24" y="512" fill="#e0b543">verified 317 entries under ./wreck: 3 problems</text>

    <text x="24" y="564"><tspan fill="#6cb6ff">$</tspan> fswreck clean ./wreck   <tspan fill="#768390"># repairs mode-000 dirs, then deletes</tspan></text>
    <text x="24" y="590" fill="#57ab5a">removed ./wreck</text>
  </g>
</svg>
